syntax = "proto3";

// Paquete Protocol Buffers del sistema DistriEats (Laboratorio 3, SD USM 2026-1).
// Define TODOS los mensajes y servicios gRPC que viajan entre las entidades:
// Cliente, Gateway, Broker, Productor y Datanodes.
package distrieats;

// go_package: dónde y con qué nombre se genera el código Go (paquete pb).
option go_package = "distrieats/proto/pb;pb";

// ----------------------------------------------------------------------------
// Reloj vectorial
// ----------------------------------------------------------------------------

// VectorClock: una entrada por Datanode. clave = node_id ("DN1", "DN2", "DN3").
message VectorClock {
  map<string, int64> entries = 1;
}

// ----------------------------------------------------------------------------
// Pedido (unidad de estado replicada)
// ----------------------------------------------------------------------------

// Order: representa un pedido y su estado causal (vector clock adjunto).
message Order {
  string order_id = 1;    // "Ped-S-001", "Ped-C1-001", ...
  string client_id = 2;   // cliente que lo originó (vacío si viene del productor)
  string restaurant = 3;  // BurgerNode, DockerPizza, SushiStream, GopherTacos
  string status = 4;      // Recibido, Preparando, En Camino, Entregado, Cancelado
  VectorClock clock = 5;  // reloj vectorial del emisor
  int64 timestamp = 6;    // instante de la última modificación (UnixNano)
}

// ----------------------------------------------------------------------------
// Cliente -> Gateway
// ----------------------------------------------------------------------------

message CrearPedidoRequest {
  string request_id = 1;         // idempotencia (generador propio)
  string client_id = 2;
  string order_id = 3;
  string restaurant = 4;
  repeated string items = 5;
}
message CrearPedidoResponse {
  bool success = 1;
  string message = 2;
  Order order = 3;
  string datanode_id = 4;        // Datanode que procesó (para el mensaje RYW)
}
message ConsultarEstadoRequest {
  string client_id = 1;
  string order_id = 2;
}
message ConsultarEstadoResponse {
  bool found = 1;
  Order order = 2;
  string datanode_id = 3;        // Datanode consultado (afinidad o round robin)
  bool from_affinity = 4;        // true si se resolvió por afinidad de sesión
}

// ----------------------------------------------------------------------------
// Gateway/Broker -> Datanode
// ----------------------------------------------------------------------------

message UpdateOrderRequest {
  Order order = 1;               // incluye vector clock del emisor
  string request_id = 2;         // idempotencia extremo a extremo
}
message UpdateOrderResponse {
  bool applied = 1;              // true si el estado entrante se aplicó
  Order resulting_order = 2;     // estado final tras merge/resolución
  string datanode_id = 3;        // Datanode que respondió
  string message = 4;            // detalle (p. ej. error de negocio)
}
message GetOrderRequest {
  string order_id = 1;
}
message GetOrderResponse {
  bool found = 1;
  Order order = 2;
  string datanode_id = 3;
}

// ----------------------------------------------------------------------------
// Gossip entre Datanodes
// ----------------------------------------------------------------------------

message GossipSyncRequest {
  repeated Order orders = 1;     // snapshot local del emisor
  VectorClock sender_clock = 2;
  string sender_id = 3;
}
message GossipSyncResponse {
  repeated Order orders = 1;     // estado del receptor para fusionar de vuelta
  string receiver_id = 2;
}

// ----------------------------------------------------------------------------
// Salud / snapshot de auditoría
// ----------------------------------------------------------------------------

message PingRequest {}
message PingResponse {
  bool alive = 1;
  string node_id = 2;
}

message SnapshotRequest {}
message SnapshotResponse {
  repeated Order orders = 1;     // estado completo del Datanode (para Reporte.txt)
  string node_id = 2;
}

// ----------------------------------------------------------------------------
// Auditoría RYW (Gateway -> Broker, para el Reporte.txt)
// ----------------------------------------------------------------------------

message RYWEntry {
  string client_id = 1;
  string order_id = 2;
  string datanode_id = 3;
}
message AuditoriaRYWRequest {}
message AuditoriaRYWResponse {
  repeated RYWEntry entries = 1;
}

// ----------------------------------------------------------------------------
// Fin de eventos (Productor -> Broker, dispara la Fase 5 / Reporte.txt)
// ----------------------------------------------------------------------------

message FinEventosRequest {
  int32 total_eventos = 1;       // cuántas líneas emitió el productor
}
message FinEventosResponse {
  bool ok = 1;
}

// ----------------------------------------------------------------------------
// Servicios
// ----------------------------------------------------------------------------

service GatewayService {
  rpc CrearPedido(CrearPedidoRequest) returns (CrearPedidoResponse);
  rpc ConsultarEstado(ConsultarEstadoRequest) returns (ConsultarEstadoResponse);
  rpc ObtenerAuditoriaRYW(AuditoriaRYWRequest) returns (AuditoriaRYWResponse);
}

service BrokerService {
  rpc EnrutarEscritura(UpdateOrderRequest) returns (UpdateOrderResponse);
  rpc EnrutarLectura(GetOrderRequest) returns (GetOrderResponse);
  rpc EmitirEventoLogistico(UpdateOrderRequest) returns (UpdateOrderResponse);
  rpc SenalarFinEventos(FinEventosRequest) returns (FinEventosResponse);
}

service DatanodeService {
  rpc UpdateOrder(UpdateOrderRequest) returns (UpdateOrderResponse);
  rpc GetOrder(GetOrderRequest) returns (GetOrderResponse);
  rpc GossipSync(GossipSyncRequest) returns (GossipSyncResponse);
  rpc Ping(PingRequest) returns (PingResponse);
  rpc Snapshot(SnapshotRequest) returns (SnapshotResponse);
}
